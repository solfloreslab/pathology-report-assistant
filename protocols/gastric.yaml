protocol:
  id: gastric
  name: "Gastric Carcinoma — CAP/ICCR-based"
  version: "1.0"
  organ: gastric
  specimen_types:
    - resection

fields:
  - name: histologic_type
    severity: required
    type: string
    description: "Tipo histologico OMS + clasificacion Lauren (intestinal/difuso/mixto)"

  - name: histologic_grade
    severity: required
    type: string
    values: ["G1", "G2", "G3"]
    description: "Grado de diferenciacion (G3 por definicion en tipo difuso)"

  - name: tumor_location
    severity: required
    type: string
    description: "Localizacion anatomica (cardias, fundus, cuerpo, antro, piloro)"

  - name: depth_of_invasion
    severity: required
    type: string
    description: "Profundidad de invasion (mucosa, submucosa, muscular, subserosa, serosa)"

  - name: pT_stage
    severity: required
    type: string
    description: "Estadificacion pT segun AJCC"

  - name: pN_stage
    severity: required
    type: string
    description: "Estadificacion pN (ganglios afectos/total)"

  - name: lymph_nodes_examined
    severity: required
    type: integer
    minimum: 0
    description: "Numero total de ganglios aislados (minimo recomendado: 16)"

  - name: lymph_nodes_positive
    severity: required
    type: integer
    minimum: 0
    description: "Numero de ganglios con metastasis"

  - name: margins_proximal
    severity: required
    type: string
    description: "Estado del margen proximal (libre/afecto + distancia)"

  - name: margins_distal
    severity: required
    type: string
    description: "Estado del margen distal (libre/afecto + distancia)"

  - name: lymphovascular_invasion
    severity: required
    type: string
    values: ["present", "absent", "not_reported"]
    description: "Invasion linfovascular"

  - name: perineural_invasion
    severity: required
    type: string
    values: ["present", "absent", "not_reported"]
    description: "Invasion perineural"

  - name: her2_status
    severity: required
    type: string
    description: "HER2 — obligatorio en gastrico avanzado (NCCN, ESMO)"

  - name: tumor_size
    severity: recommended
    type: string
    description: "Tamano del tumor (cm)"

  - name: extranodal_extension
    severity: recommended
    type: string
    description: "Extension extranodal"

  - name: pdl1_cps
    severity: recommended
    type: string
    description: "PD-L1 CPS score"

  - name: msi_mmr
    severity: recommended
    type: string
    description: "Estado MSI/MMR"

rules:
  - condition: "lymph_nodes_examined is missing"
    check: "error"
    severity: critical
    message: "No se reporta conteo de ganglios — obligatorio en gastrectomia"

  - condition: "lymph_nodes_examined < 16"
    check: "warning"
    severity: warning
    message: "Menos de 16 ganglios examinados — por debajo del minimo recomendado"

  - condition: "histologic_type contains 'difuso' and histologic_grade is missing"
    check: "warning"
    severity: warning
    message: "Tipo difuso sin grado explicito — G3 por definicion (consignar)"

  - condition: "pT_stage >= pT3 and her2_status is missing"
    check: "warning"
    severity: warning
    message: "Gastrico avanzado sin HER2 — obligatorio segun NCCN/ESMO"

  - condition: "pT_stage is missing"
    check: "error"
    severity: critical
    message: "Sin estadificacion pT — impide estadificacion y planificacion terapeutica"
